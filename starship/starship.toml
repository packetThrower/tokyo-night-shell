"$schema" = 'https://starship.rs/config-schema.json'

# ─── Layout ───────────────────────────────────────────────────────────────────
add_newline = true
palette = "tokyo_night"

format = """
[╭─](comment) \
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$rust\
$golang\
$lua\
$bun\
$deno\
$ruby\
$php\
$package\
$docker_context\
$kubernetes\
$jobs\
$cmd_duration\
$line_break\
[╰─](comment)$character"""

right_format = "$time"

# ─── Tokyo Night palettes (matches WezTerm) ───────────────────────────────────
[palettes.tokyo_night]
fg           = "#c0caf5"
fg_dim       = "#a9b1d6"
comment      = "#565f89"
blue         = "#7aa2f7"
cyan         = "#7dcfff"
magenta      = "#bb9af7"
purple       = "#9d7cd8"
green        = "#9ece6a"
yellow       = "#e0af68"
orange       = "#ff9e64"
red          = "#f7768e"

# Darker than canonical Tokyo Night Day: tuned for translucent terminals
# where vibrancy+blur mix the wallpaper into the bg.
[palettes.tokyo_night_day]
fg           = "#2c4d99"
fg_dim       = "#3e4d80"
comment      = "#3a4566"
blue         = "#1f5fcc"
cyan         = "#005d7a"
magenta      = "#6a1fbf"
purple       = "#4f2387"
green        = "#3d5520"
yellow       = "#5f4419"
orange       = "#8a4400"
red          = "#c80f4a"

# ─── Modules ──────────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold blue)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
format            = "[$path]($style)[$read_only]($read_only_style) "
style             = "bold blue"
read_only         = " "
read_only_style   = "red"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo  = true

[directory.substitutions]
"Documents" = "󰈙 Documents"
"Downloads" = " Downloads"
"Music"     = " Music"
"Pictures"  = " Pictures"

[git_branch]
symbol            = ""
format            = "[$symbol $branch](fg:cyan)[$remote_branch](fg:fg_dim) "
truncation_length = 18
truncation_symbol = "…"

[git_status]
format     = '[$all_status$ahead_behind]($style) '
style      = "fg:yellow"
conflicted = "[=$count](fg:red)"
ahead      = "[⇡$count](fg:green)"
behind     = "[⇣$count](fg:yellow)"
diverged   = "[⇕⇡$ahead_count⇣$behind_count](fg:orange)"
up_to_date = ""
untracked  = "[?$count](fg:comment)"
stashed    = "[\\$$count](fg:magenta)"
modified   = "[!$count](fg:yellow)"
staged     = "[+$count](fg:green)"
renamed    = "[»$count](fg:cyan)"
deleted    = "[✘$count](fg:red)"

[git_state]
format = '\([$state( $progress_current/$progress_total)](fg:orange)\) '

[cmd_duration]
min_time          = 500
format            = "[· $duration](fg:yellow) "
show_milliseconds = false

[time]
disabled    = false
time_format = "%H:%M"
format      = "[$time](fg:comment)"

[nodejs]
symbol         = ""
format         = "[$symbol $version](fg:green) "
version_format = "v${raw}"

[python]
symbol         = ""
format         = '[$symbol $version( \($virtualenv\))](fg:yellow) '
version_format = "v${raw}"

[rust]
symbol         = ""
format         = "[$symbol $version](fg:orange) "
version_format = "v${raw}"

[golang]
symbol         = ""
format         = "[$symbol $version](fg:cyan) "
version_format = "v${raw}"

[lua]
symbol         = ""
format         = "[$symbol $version](fg:blue) "
version_format = "v${raw}"

[bun]
symbol = ""
format = "[$symbol $version](fg:magenta) "

[deno]
symbol = ""
format = "[$symbol $version](fg:cyan) "

[ruby]
symbol = ""
format = "[$symbol $version](fg:red) "

[php]
symbol = ""
format = "[$symbol $version](fg:purple) "

[package]
symbol          = " "
format          = "[$symbol$version](fg:magenta) "
display_private = false

[docker_context]
symbol          = ""
format          = "[$symbol $context](fg:blue) "
only_with_files = true

[kubernetes]
disabled = true
symbol   = "󱃾"
format   = '[$symbol $context\($namespace\)](fg:cyan) '

[jobs]
symbol           = "✦"
format           = "[$symbol$number](fg:yellow) "
threshold        = 1
symbol_threshold = 1

[username]
show_always = false
format      = "[$user](fg:yellow) "
style_root  = "fg:red"

[hostname]
ssh_only = true
format   = "[@$hostname](fg:magenta) "

[battery]
disabled = true
